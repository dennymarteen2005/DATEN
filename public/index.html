<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATEN — Co-op Puzzle Platformer</title>
    <meta name="description" content="DATEN: Anti-gravity co-op puzzle platformer with elastic chains. 4 players, AI bots, defy gravity together!">

    <!-- Google Font: Pixel Art style but clean -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Our custom styles -->
    <link rel="stylesheet" href="css/style.css?v=4">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #fff;
            touch-action: none; /* Prevent mobile pull-to-refresh & scrolling */
        }
        #version-badge {
            position: fixed;
            bottom: 4px;
            right: 6px;
            font-size: 9px;
            color: rgba(255,255,255,0.25);
            font-family: monospace;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 
        The game canvas gets injected here by Phaser.js.
        The wrapper div gives us the dark background + centering.
    -->
    <div id="game-wrapper">
        <div id="game-container"></div>
    </div>

    <!-- Version badge — confirms which build is live -->
    <div id="version-badge">v4.0</div>

    <!-- Phaser.js — The 2D game engine (loaded from CDN, no install needed) -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <!-- Socket.IO — Real-time multiplayer communication -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Our game files (order matters! Dependencies first) -->
    <script src="js/assets/SpriteGenerator.js?v=4"></script>
    <script src="js/systems/NetworkManager.js?v=4"></script>
    <script src="js/systems/LevelManager.js?v=4"></script>
    <script src="js/systems/ChainSystem.js?v=4"></script>
    <script src="js/entities/Player.js?v=4"></script>
    <script src="js/entities/AICompanion.js?v=4"></script>
    <script src="js/scenes/MenuScene.js?v=4"></script>
    <script src="js/scenes/LobbyScene.js?v=4"></script>
    <script src="js/scenes/GameScene.js?v=4"></script>
    <script src="js/main.js?v=4"></script>
</body>
</html>
